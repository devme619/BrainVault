<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Tech/AI Glow Gradient (Left Side Nodes) -->
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <!-- Organic/Brain Gradient (Right Side Silhouette) -->
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Vault Metal Wheel Gradient -->
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Vibrant Outer Glow Filter for Dark Mode Pop -->
    <filter id="electricGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="brightBlur">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="brightBlur" operator="over" />
    </filter>
  </defs>

  <!-- LOGO ICON GROUP (Transparent Background) -->
  <g transform="translate(0, -20)" filter="url(#electricGlow)">
    
    <!-- LEFT SIDE: Tech / Network Brain (Nodes and Connections) -->
    <g stroke="url(#techGrad)" stroke-width="2.5" opacity="0.95">
      <!-- Connection Lines -->
      <line x1="400" y1="90" x2="350" y2="110" />
      <line x1="350" y1="110" x2="310" y2="150" />
      <line x1="310" y1="150" x2="290" y2="210" />
      <line x1="290" y1="210" x2="310" y2="270" />
      <line x1="310" y1="270" x2="360" y2="310" />
      <line x1="360" y1="310" x2="400" y2="330" />
      
      <!-- Inner Network Webbing -->
      <line x1="350" y1="110" x2="360" y2="180" />
      <line x1="310" y1="150" x2="360" y2="180" />
      <line x1="290" y1="210" x2="350" y2="220" />
      <line x1="310" y1="270" x2="350" y2="220" />
      <line x1="360" y1="310" x2="380" y2="260" />
      
      <!-- Center Anchors to Vault -->
      <line x1="360" y1="180" x2="400" y2="210" />
      <line x1="350" y1="220" x2="400" y2="210" />
    </g>

    <!-- Network Nodes (Circles) -->
    <g fill="url(#techGrad)">
      <circle cx="400" cy="90" r="5" />
      <circle cx="350" cy="110" r="6" />
      <circle cx="310" cy="150" r="6" />
      <circle cx="290" cy="210" r="7.5" />
      <circle cx="310" cy="270" r="6" />
      <circle cx="360" cy="310" r="6" />
      <circle cx="360" cy="180" r="5" />
      <circle cx="350" cy="220" r="5" />
      <circle cx="380" cy="260" r="4" />
    </g>

    <!-- RIGHT SIDE: Solid/Organic Brain Silhouette with Circuit Tracks -->
    <path d="M 400 90 
             C 440 90, 470 100, 490 120 
             C 520 150, 520 190, 500 220 
             C 530 250, 510 300, 470 310 
             C 450 315, 430 305, 420 330
             L 400 330 Z" 
          fill="url(#brainGrad)" opacity="0.9" />

    <!-- Circuit Lines on Right Side -->
    <g stroke="#00f2fe" stroke-width="2.5" fill="none" opacity="0.95">
      <path d="M 430 130 H 460 L 480 160" />
      <circle cx="480" cy="160" r="3.5" fill="#00f2fe" />
      
      <path d="M 450 180 H 480 L 495 210" />
      <circle cx="495" cy="210" r="3.5" fill="#00f2fe" />
      
      <path d="M 430 270 H 460 L 475 240" />
      <circle cx="475" cy="240" r="3.5" fill="#00f2fe" />
    </g>

    <!-- CENTERPIECE: The Vault Door -->
    <g transform="translate(400, 210)">
      <!-- Outer Vault Ring -->
      <circle cx="0" cy="0" r="65" fill="none" stroke="url(#vaultGrad)" stroke-width="10" />
      
      <!-- Vault Flanges / Locking Lugs -->
      <g fill="url(#vaultGrad)">
        <rect x="-6" y="-78" width="12" height="16" rx="2" />
        <rect x="-6" y="62" width="12" height="16" rx="2" />
        <rect x="-78" y="-6" width="16" height="12" rx="2" />
        <rect x="62" y="-6" width="16" height="12" rx="2" />
        
        <rect x="-51" y="-51" width="12" height="12" rx="2" transform="rotate(45)" />
        <rect x="39" y="-51" width="12" height="12" rx="2" transform="rotate(45)" />
        <rect x="-51" y="39" width="12" height="12" rx="2" transform="rotate(45)" />
        <rect x="39" y="39" width="12" height="12" rx="2" transform="rotate(45)" />
      </g>
      
      <!-- Inner Vault Dial Face (Slightly dark to block out background brain fill) -->
      <circle cx="0" cy="0" r="45" fill="#020617" stroke="url(#vaultGrad)" stroke-width="3" />
      
      <!-- Central AI Core Node -->
      <circle cx="0" cy="0" r="25" fill="url(#techGrad)" />
      
      <!-- "AI" Text inside the vault center -->
      <text x="0" y="8" 
            font-family="system-ui, -apple-system, sans-serif" 
            font-weight="900" 
            font-size="22" 
            fill="#020617" 
            text-anchor="middle">AI</text>
    </g>
  </g>

  <!-- TYPOGRAPHY SECTION -->
  <!-- Brand Name -->
  <text x="400" y="395" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="800" 
        font-size="48" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="4">
    BRAIN<tspan fill="#00f2fe">VAULT</tspan>
  </text>

  <!-- Tagline -->
  <text x="400" y="430" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="500" 
        font-size="14" 
        fill="#94a3b8" 
        text-anchor="middle" 
        letter-spacing="3">
    ELEVATE YOUR LEARNING • STUDY SMARTER
  </text>
</svg>
